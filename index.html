<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Deutsch B1</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a73e8">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #1a73e8 0%, #4fc3f7 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-card { background: white; border-radius: 20px; padding: 40px 32px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo .flag-big { width: 48px; height: 32px; border-radius: 4px; overflow: hidden; display: inline-flex; flex-direction: column; margin-bottom: 12px; }
    .login-logo .flag-big span { flex: 1; }
    .login-logo .flag-big .bk { background: #000; }
    .login-logo .flag-big .rd { background: #dd0000; }
    .login-logo .flag-big .gd { background: #ffcc00; }
    .login-logo h1 { font-size: 24px; color: var(--text); margin-bottom: 4px; }
    .login-logo p { font-size: 14px; color: var(--text-secondary); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; font-family: var(--font); transition: border-color 0.15s; }
    .form-group input:focus { outline: none; border-color: var(--primary); }
    .form-error { color: var(--error); font-size: 13px; margin-top: 4px; display: none; }
    .form-error.show { display: block; }
    .divider { display: flex; align-items: center; margin: 20px 0; gap: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 12px; color: var(--text-muted); }
    .btn-google { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: white; color: var(--text); font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-family: var(--font); transition: all 0.15s; }
    .btn-google:hover { border-color: var(--primary); background: var(--primary-light); }
    .btn-google img { width: 20px; height: 20px; }
    .toggle-link { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-secondary); }
    .toggle-link a { color: var(--primary); text-decoration: none; font-weight: 500; }
    .toggle-link a:hover { text-decoration: underline; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="flag-big"><span class="bk"></span><span class="rd"></span><span class="gd"></span></div>
      <h1>Deutsch B1</h1>
      <p>Lộ trình học tiếng Đức B1 trong 6 tháng</p>
    </div>

    <!-- LOGIN FORM -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" required placeholder="email@example.com">
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" id="login-password" required placeholder="••••••••" minlength="6">
      </div>
      <div class="form-error" id="login-error"></div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:12px;">
        <i class="fa-solid fa-right-to-bracket"></i> Đăng nhập
      </button>
      <div class="toggle-link">Chưa có tài khoản? <a href="#" onclick="showRegister()">Đăng ký</a></div>
    </form>

    <!-- REGISTER FORM -->
    <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Tên hiển thị</label>
        <input type="text" id="reg-name" required placeholder="VD: Tùng">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" required placeholder="email@example.com">
      </div>
      <div class="form-group">
        <label>Mật khẩu (tối thiểu 6 ký tự)</label>
        <input type="password" id="reg-password" required placeholder="••••••••" minlength="6">
      </div>
      <div class="form-error" id="reg-error"></div>
      <button type="submit" class="btn btn-success btn-block btn-lg" style="margin-top:12px;">
        <i class="fa-solid fa-user-plus"></i> Đăng ký
      </button>
      <div class="toggle-link">Đã có tài khoản? <a href="#" onclick="showLogin()">Đăng nhập</a></div>
    </form>

    <div class="divider"><span>hoặc</span></div>
    <button class="btn-google" onclick="handleGoogle()">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Đăng nhập bằng Google
    </button>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    function showRegister() {
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('register-form').classList.remove('hidden');
    }
    function showLogin() {
      document.getElementById('register-form').classList.add('hidden');
      document.getElementById('login-form').classList.remove('hidden');
    }
    function showError(id, msg) {
      var el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('show');
    }
    function clearErrors() {
      document.querySelectorAll('.form-error').forEach(function(el) { el.classList.remove('show'); });
    }

    function handleLogin(e) {
      e.preventDefault();
      clearErrors();
      var email = document.getElementById('login-email').value;
      var pass = document.getElementById('login-password').value;
      Auth.login(email, pass)
        .then(function() { window.location.href = 'app/today.html'; })
        .catch(function(err) { showError('login-error', getErrorMsg(err.code)); });
    }

    function handleRegister(e) {
      e.preventDefault();
      clearErrors();
      var name = document.getElementById('reg-name').value;
      var email = document.getElementById('reg-email').value;
      var pass = document.getElementById('reg-password').value;
      Auth.register(email, pass, name)
        .then(function() { window.location.href = 'app/today.html'; })
        .catch(function(err) { showError('reg-error', getErrorMsg(err.code)); });
    }

    function handleGoogle() {
      clearErrors();
      Auth.loginWithGoogle()
        .then(function() { window.location.href = 'app/today.html'; })
        .catch(function(err) { showError('login-error', getErrorMsg(err.code)); });
    }

    function getErrorMsg(code) {
      var msgs = {
        'auth/email-already-in-use': 'Email đã được sử dụng.',
        'auth/invalid-email': 'Email không hợp lệ.',
        'auth/wrong-password': 'Sai mật khẩu.',
        'auth/user-not-found': 'Không tìm thấy tài khoản.',
        'auth/weak-password': 'Mật khẩu quá yếu (cần tối thiểu 6 ký tự).',
        'auth/too-many-requests': 'Quá nhiều lần thử. Vui lòng đợi một lát.',
        'auth/popup-closed-by-user': 'Đã đóng cửa sổ đăng nhập.'
      };
      return msgs[code] || 'Lỗi: ' + code;
    }
  </script>
</body>
</html>
