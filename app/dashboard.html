<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiến độ - Deutsch B1</title>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#1a73e8">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div id="navbar"></div>
  <div class="container" id="app-content">
    <div class="loading"><div class="spinner"></div> Đang tải...</div>
  </div>
  <div class="toast" id="toast"></div>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/progress.js"></script>
  <script src="../js/tts.js"></script>
  <script src="../js/data/nicos-weg.js"></script>
  <script src="../js/app.js"></script>
  <script>
  function pageInit() {
    var data = Progress.get();
    var p = data.progress;
    var html = '';

    html += '<div class="section-header"><h2 class="section-title"><i class="fa-solid fa-chart-line"></i> Tiến độ học tập</h2>';
    html += '<p class="section-desc">Theo dõi hành trình B1 của bạn</p></div>';

    // Stats cards
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:24px;">';
    var stats = [
      { icon: 'fa-fire', color: '#ea4335', label: 'Streak', value: (p.streak || 0) + ' ngày' },
      { icon: 'fa-calendar-check', color: '#34a853', label: 'Ngày đã học', value: (p.daysStudied || 0) },
      { icon: 'fa-clock', color: '#1a73e8', label: 'Thời gian', value: (p.totalMinutes || 0) + ' ph' },
      { icon: 'fa-book', color: '#f9ab00', label: 'Từ vựng', value: (data.vocabulary.wordsKnown || []).length },
      { icon: 'fa-headphones', color: '#00bcd4', label: 'Luyện nghe', value: (data.listening.sessions || 0) + 'x' },
      { icon: 'fa-microphone', color: '#9c27b0', label: 'Ghi âm', value: Object.keys(data.dailyLogs || {}).filter(function(d){ var l=data.dailyLogs[d]; return l&&l.blocks&&l.blocks.speaking&&l.blocks.speaking.audioUrl; }).length + 'x' }
    ];
    for (var i = 0; i < stats.length; i++) {
      var s = stats[i];
      html += '<div class="card" style="text-align:center;padding:14px 8px;">';
      html += '<i class="fa-solid '+s.icon+'" style="font-size:18px;color:'+s.color+';margin-bottom:4px;"></i>';
      html += '<div style="font-size:18px;font-weight:700;">'+s.value+'</div>';
      html += '<div style="font-size:10px;color:var(--text-muted);">'+s.label+'</div>';
      html += '</div>';
    }
    html += '</div>';

    // ===== NICOS WEG PROGRESS (A1 / A2 / B1) =====
    html += '<div class="card">';
    html += '<h3 style="font-size:15px;font-weight:600;margin-bottom:16px;"><i class="fa-solid fa-film"></i> Nicos Weg — Tiến độ</h3>';

    // Count A1 completed from nicosWeg object
    var nicosWeg = p.nicosWeg || {};
    var a1Done = 0;
    Object.keys(nicosWeg).forEach(function(key) { if (key.indexOf('A1_') === 0) a1Done++; });

    // Current lesson info
    var currentIdx = p.currentLessonIndex || 0;
    var currentLesson = null;
    if (typeof NICOS_WEG_DATA !== 'undefined' && NICOS_WEG_DATA.levels && NICOS_WEG_DATA.levels[0]) {
      var allLessons = [];
      NICOS_WEG_DATA.levels[0].chapters.forEach(function(ch) {
        ch.lessons.forEach(function(l) { allLessons.push(l); });
      });
      if (currentIdx < allLessons.length) currentLesson = allLessons[currentIdx];
    }

    // A1 Progress Bar
    var a1Pct = Math.round((a1Done / 77) * 100);
    html += '<div style="margin-bottom:14px;">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">';
    html += '<span style="font-size:13px;font-weight:600;color:#1a73e8;">A1</span>';
    html += '<span style="font-size:11px;color:var(--text-muted);">' + a1Done + '/77 (' + a1Pct + '%)</span>';
    html += '</div>';
    html += '<div class="progress-bar"><div class="progress-fill" style="width:' + a1Pct + '%;background:#1a73e8;"></div></div>';
    html += '</div>';

    // A2 Progress Bar (placeholder)
    html += '<div style="margin-bottom:14px;">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">';
    html += '<span style="font-size:13px;font-weight:600;color:#34a853;">A2</span>';
    html += '<span style="font-size:11px;color:var(--text-muted);">0/77 (0%)</span>';
    html += '</div>';
    html += '<div class="progress-bar"><div class="progress-fill" style="width:0%;background:#34a853;"></div></div>';
    html += '</div>';

    // B1 Progress Bar (placeholder)
    html += '<div style="margin-bottom:14px;">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">';
    html += '<span style="font-size:13px;font-weight:600;color:#f9ab00;">B1</span>';
    html += '<span style="font-size:11px;color:var(--text-muted);">0/77 (0%)</span>';
    html += '</div>';
    html += '<div class="progress-bar"><div class="progress-fill" style="width:0%;background:#f9ab00;"></div></div>';
    html += '</div>';

    // Current lesson indicator
    if (currentLesson) {
      html += '<div style="margin-top:12px;padding:10px 12px;background:var(--primary-light);border-radius:var(--radius-sm);font-size:12px;">';
      html += '<span style="font-weight:600;">📖 Bài đang học:</span> ';
      html += currentLesson.title + ' — ' + currentLesson.topic;
      html += '</div>';
    }
    html += '</div>';

    // Overall progress (week-based)
    var totalLessons = 77;
    var overallPct = Math.min(100, Math.round((a1Done / totalLessons) * 100));
    html += '<div class="card"><h3 style="font-size:15px;font-weight:600;margin-bottom:12px;">📈 Tiến độ tổng</h3>';
    html += '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:6px;"><span>Bài ' + (currentIdx + 1) + '/77</span><span>' + overallPct + '%</span></div>';
    html += '<div class="progress-bar"><div class="progress-fill" style="width:' + overallPct + '%;"></div></div>';
    html += '</div>';

    // Achievements
    html += '<div class="card"><h3 style="font-size:15px;font-weight:600;margin-bottom:12px;">🏆 Thành tựu</h3>';
    var achievements = [
      { icon: '🎯', name: 'Khởi đầu', desc: 'Hoàn thành ngày đầu tiên', done: (p.daysStudied || 0) >= 1 },
      { icon: '🔥', name: 'Streak 3', desc: '3 ngày liên tiếp', done: (p.longestStreak || 0) >= 3 },
      { icon: '🔥', name: 'Streak 7', desc: '7 ngày liên tiếp', done: (p.longestStreak || 0) >= 7 },
      { icon: '📚', name: '10 bài DW', desc: 'Hoàn thành 10 bài Nicos Weg', done: a1Done >= 10 },
      { icon: '🎤', name: 'Luyện nói', desc: 'Ghi âm 5 lần', done: Object.keys(data.dailyLogs || {}).filter(function(d){ var l=data.dailyLogs[d]; return l&&l.blocks&&l.blocks.speaking&&l.blocks.speaking.audioUrl; }).length >= 5 },
      { icon: '🎓', name: 'A1 Done', desc: 'Hoàn thành 77 bài A1', done: a1Done >= 77 }
    ];
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;">';
    for (var a = 0; a < achievements.length; a++) {
      var ach = achievements[a];
      html += '<div style="padding:10px;border-radius:var(--radius-sm);text-align:center;'+(ach.done?'background:var(--success-light);border:1px solid var(--success);':'background:var(--bg);border:1px solid var(--border-light);opacity:0.5;')+'">';
      html += '<div style="font-size:22px;">'+ach.icon+'</div>';
      html += '<div style="font-size:11px;font-weight:600;margin-top:3px;">'+ach.name+'</div>';
      html += '<div style="font-size:9px;color:var(--text-muted);">'+ach.desc+'</div>';
      html += '</div>';
    }
    html += '</div></div>';

    // Recent activity
    var dailyLogs = data.dailyLogs || {};
    var recentDays = Object.keys(dailyLogs).sort().reverse().slice(0, 5);
    if (recentDays.length > 0) {
      html += '<div class="card"><h3 style="font-size:15px;font-weight:600;margin-bottom:12px;">📝 Hoạt động gần đây</h3>';
      for (var r = 0; r < recentDays.length; r++) {
        var day = recentDays[r];
        var log = dailyLogs[day];
        var blocks = log.blocks || {};
        var blocksCompleted = 0;
        if (blocks.warmup && blocks.warmup.completed) blocksCompleted++;
        if (blocks.content && blocks.content.completed) blocksCompleted++;
        if (blocks.speaking && blocks.speaking.completed) blocksCompleted++;
        if (blocks.wrapup && blocks.wrapup.completed) blocksCompleted++;
        var dateObj = new Date(day + 'T00:00:00');
        var dateStr = dateObj.toLocaleDateString('vi-VN', { day: 'numeric', month: 'numeric' });
        var evalStr = (blocks.wrapup && blocks.wrapup.evaluation) || '';
        var evalIcon = evalStr === 'good' ? '😊' : (evalStr === 'average' ? '😐' : (evalStr === 'needs_work' ? '💪' : ''));
        html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:13px;">';
        html += '<span>' + dateStr + ' — ' + blocksCompleted + '/4 blocks</span>';
        html += '<span>' + evalIcon + '</span>';
        html += '</div>';
      }
      html += '</div>';
    }

    document.getElementById('app-content').innerHTML = html;
  }
  </script>
</body>
</html>
