<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - Deutsch B1</title>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#1a73e8">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .quiz-opt { padding:14px;border:2px solid var(--border);border-radius:var(--radius-md);text-align:center;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.15s;background:var(--surface);margin-bottom:10px; }
    .quiz-opt:hover { border-color:var(--primary);background:var(--primary-light); }
    .quiz-opt.correct { border-color:var(--success);background:var(--success-light);color:var(--success); }
    .quiz-opt.wrong { border-color:var(--error);background:var(--error-light);color:var(--error); }
    .quiz-opt.disabled { pointer-events:none;opacity:0.6; }
  </style>
</head>
<body>
  <div id="navbar"></div>
  <div class="container" id="app-content">
    <div class="loading"><div class="spinner"></div> Đang tải...</div>
  </div>
  <div class="toast" id="toast"></div>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/progress.js"></script>
  <script src="../js/tts.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/data/vocabulary.js"></script>
  <script>
  var questions=[], curQ=0, score=0, answered=false;

  function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

  function genQuiz() {
    var allWords = [];
    VOCAB_DATA.week1.days.forEach(function(d){ d.words.forEach(function(w){ allWords.push(w); }); });
    var pool = shuffle(allWords).slice(0, 15);
    return pool.map(function(w) {
      var type = Math.random() < 0.5 ? 'de2vi' : 'vi2de';
      var others = shuffle(allWords.filter(function(x){return x.de!==w.de;})).slice(0,3);
      if (type === 'de2vi') {
        var opts = shuffle([w.vi].concat(others.map(function(x){return x.vi;})));
        return { question: w.de, answer: w.vi, options: opts, type: 'de2vi' };
      } else {
        var opts = shuffle([w.de].concat(others.map(function(x){return x.de;})));
        return { question: w.vi, answer: w.de, options: opts, type: 'vi2de' };
      }
    });
  }

  function pageInit() { startQuiz(); }

  function startQuiz() { questions = genQuiz(); curQ = 0; score = 0; renderQuiz(); }

  function renderQuiz() {
    if (curQ >= questions.length) { showQuizResults(); return; }
    answered = false;
    var q = questions[curQ];
    var html = '';
    html += '<div class="card" style="text-align:center;">';
    html += '<div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text-muted);margin-bottom:12px;"><span>Câu '+(curQ+1)+'/'+questions.length+'</span><span style="color:var(--success);">✓ '+score+'</span></div>';
    html += '<div class="progress-bar" style="margin-bottom:20px;"><div class="progress-fill" style="width:'+((curQ+1)/questions.length*100)+'%;"></div></div>';
    html += '<p style="font-size:13px;color:var(--text-secondary);margin-bottom:6px;">'+(q.type==='de2vi'?'Từ tiếng Đức → Nghĩa tiếng Việt':'Nghĩa tiếng Việt → Từ tiếng Đức')+'</p>';
    html += '<div style="font-size:24px;font-weight:700;color:var(--primary);margin-bottom:20px;">'+q.question+'</div>';
    if (q.type === 'de2vi') html += '<button class="btn btn-outline btn-sm" style="margin-bottom:16px;" onclick="TTS.speak(\''+q.question.replace(/'/g,"\\'")+'\')"><i class="fa-solid fa-volume-high"></i> Nghe</button>';

    for (var i = 0; i < q.options.length; i++) {
      html += '<div class="quiz-opt" onclick="selectQuizOpt(this,\''+q.options[i].replace(/'/g,"\\'")+'\')">'+q.options[i]+'</div>';
    }
    html += '<div id="quiz-fb" style="margin-top:12px;font-size:14px;font-weight:500;"></div>';
    html += '<button class="btn btn-primary" id="quiz-next" style="display:none;margin-top:12px;" onclick="curQ++;renderQuiz();">Câu tiếp <i class="fa-solid fa-arrow-right"></i></button>';
    html += '</div>';
    document.getElementById('app-content').innerHTML = html;
  }

  window.selectQuizOpt = function(el, val) {
    if (answered) return; answered = true;
    var q = questions[curQ];
    var opts = document.querySelectorAll('.quiz-opt');
    if (val === q.answer) { el.classList.add('correct'); score++; document.getElementById('quiz-fb').innerHTML = '<span style="color:var(--success);">Chính xác! 🎉</span>'; }
    else { el.classList.add('wrong'); opts.forEach(function(o){if(o.textContent===q.answer)o.classList.add('correct');else if(!o.classList.contains('wrong'))o.classList.add('disabled');}); document.getElementById('quiz-fb').innerHTML = '<span style="color:var(--error);">Sai! Đáp án: '+q.answer+'</span>'; }
    document.getElementById('quiz-next').style.display = 'inline-flex';
  };

  function showQuizResults() {
    Progress.logQuiz(score, questions.length);
    var pct = Math.round((score/questions.length)*100);
    var emoji = pct>=90?'🏆':pct>=70?'🎉':pct>=50?'💪':'📖';
    var html = '<div class="card" style="text-align:center;padding:40px 20px;">';
    html += '<div style="font-size:48px;margin-bottom:8px;">'+emoji+'</div>';
    html += '<h2 style="margin-bottom:4px;">'+score+'/'+questions.length+' đúng ('+pct+'%)</h2>';
    html += '<p style="color:var(--text-secondary);margin-bottom:20px;">'+(pct>=70?'Tốt lắm! Tiếp tục phát huy!':'Cần ôn thêm từ vựng nhé!')+'</p>';
    html += '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">';
    html += '<button class="btn btn-primary" onclick="startQuiz()"><i class="fa-solid fa-rotate"></i> Làm lại</button>';
    html += '<a href="vocabulary.html" class="btn btn-outline"><i class="fa-solid fa-book"></i> Ôn từ vựng</a>';
    html += '</div></div>';
    document.getElementById('app-content').innerHTML = html;
  }
  </script>
</body>
</html>
