<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phát âm - Deutsch B1</title>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#1a73e8">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .alpha-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-bottom:24px; }
    .letter-card { background:var(--surface);border:2px solid var(--border-light);border-radius:var(--radius-md);padding:12px;cursor:pointer;text-align:center;transition:all 0.2s; }
    .letter-card:hover { border-color:var(--primary);box-shadow:var(--shadow-md);transform:translateY(-2px); }
    .letter-card.special { border-color:var(--warning);background:linear-gradient(135deg,#fffde7,#fff8e1); }
    .letter-card .letter { font-size:28px;font-weight:800;color:var(--primary);line-height:1.2; }
    .letter-card.special .letter { color:#c62828; }
    .letter-card .letter-name { font-size:11px;font-weight:600;color:var(--text-secondary);margin-top:2px; }
    .letter-card .pronunciation { font-size:10px;color:var(--text-muted);margin-top:2px;font-style:italic; }
    .rule-card { background:var(--surface);border:1.5px solid var(--border-light);border-radius:var(--radius-md);padding:16px;margin-bottom:12px; }
    .rule-badge { background:var(--primary);color:white;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600;display:inline-block;margin-right:8px; }
    .rule-example { display:inline-flex;align-items:center;gap:4px;background:var(--primary-light);padding:4px 10px;border-radius:100px;font-size:11px;font-weight:500;color:var(--primary-dark);cursor:pointer;margin:3px;transition:all 0.15s; }
    .rule-example:hover { background:var(--primary);color:white; }
    @media(max-width:480px) { .alpha-grid { grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); } .letter-card .letter { font-size:22px; } }
  </style>
</head>
<body>
  <div id="navbar"></div>
  <div class="container" id="app-content">
    <div class="loading"><div class="spinner"></div> Đang tải...</div>
  </div>
  <div class="toast" id="toast"></div>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/progress.js"></script>
  <script src="../js/tts.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/data/alphabet.js"></script>
  <script>
  var currentTab = 'alphabet';

  function pageInit() { render(); }

  function render() {
    var html = '';
    // Header
    html += '<div style="background:linear-gradient(135deg,#000 0%,#dd0000 50%,#ffcc00 100%);border-radius:var(--radius-xl);padding:28px;color:white;margin-bottom:24px;position:relative;overflow:hidden;">';
    html += '<div style="position:relative;z-index:1;">';
    html += '<h1 style="font-size:22px;margin-bottom:4px;"><i class="fa-solid fa-volume-high"></i> Phát âm tiếng Đức</h1>';
    html += '<p style="opacity:0.9;font-size:13px;">Bảng chữ cái, quy tắc ghép âm & bài tập</p>';
    html += '</div></div>';

    // Tabs
    html += '<div style="display:flex;gap:6px;margin-bottom:20px;">';
    html += '<button class="btn btn-sm '+(currentTab==='alphabet'?'btn-primary':'btn-outline')+'" onclick="switchAlphaTab(\'alphabet\')"><i class="fa-solid fa-th"></i> Bảng chữ cái</button>';
    html += '<button class="btn btn-sm '+(currentTab==='rules'?'btn-primary':'btn-outline')+'" onclick="switchAlphaTab(\'rules\')"><i class="fa-solid fa-link"></i> Quy tắc ghép âm</button>';
    html += '</div>';

    if (currentTab === 'alphabet') {
      // Normal letters
      html += '<h3 style="font-size:16px;margin-bottom:12px;">Bảng chữ cái (26 chữ)</h3>';
      html += '<p style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;"><i class="fa-solid fa-hand-pointer"></i> Nhấn vào chữ cái để nghe phát âm</p>';
      html += '<div class="alpha-grid">';
      for (var i = 0; i < ALPHABET_DATA.letters.length; i++) {
        var l = ALPHABET_DATA.letters[i];
        html += '<div class="letter-card" onclick="TTS.speak(\''+l.name+'\',0.7);Progress.learnLetter(\''+l.letter+'\');">';
        html += '<div class="letter">'+l.letter+'</div>';
        html += '<div class="letter-name">'+l.name+'</div>';
        html += '<div class="pronunciation">'+l.vn+'</div>';
        html += '</div>';
      }
      html += '</div>';

      // Special
      html += '<h3 style="font-size:16px;margin-bottom:12px;margin-top:24px;"><i class="fa-solid fa-star" style="color:var(--warning);"></i> Chữ cái đặc biệt</h3>';
      html += '<div class="alpha-grid">';
      for (var j = 0; j < ALPHABET_DATA.special.length; j++) {
        var s = ALPHABET_DATA.special[j];
        html += '<div class="letter-card special" onclick="TTS.speak(\''+s.example+'\',0.7);">';
        html += '<div class="letter">'+s.letter+'</div>';
        html += '<div class="letter-name">'+s.name+'</div>';
        html += '<div class="pronunciation">'+s.vn+'</div>';
        html += '</div>';
      }
      html += '</div>';

      // Special details
      for (var k = 0; k < ALPHABET_DATA.special.length; k++) {
        var sp = ALPHABET_DATA.special[k];
        html += '<div class="card" style="margin-top:12px;"><div style="display:flex;align-items:center;gap:12px;">';
        html += '<span style="font-size:32px;font-weight:800;color:#c62828;">'+sp.letter+'</span>';
        html += '<div><div style="font-weight:600;">'+sp.name+' — '+sp.vn+'</div>';
        html += '<div style="font-size:12px;color:var(--text-secondary);">VD: '+sp.example+' ('+sp.exampleVi+')</div>';
        html += '<div style="font-size:12px;color:var(--warning);margin-top:4px;">💡 '+sp.tip+'</div></div>';
        html += '</div></div>';
      }
    } else {
      // Rules
      html += '<h3 style="font-size:16px;margin-bottom:12px;">Quy tắc ghép âm quan trọng</h3>';
      html += '<p style="font-size:12px;color:var(--text-secondary);margin-bottom:16px;"><i class="fa-solid fa-hand-pointer"></i> Nhấn vào ví dụ để nghe phát âm</p>';
      for (var r = 0; r < ALPHABET_DATA.rules.length; r++) {
        var rule = ALPHABET_DATA.rules[r];
        html += '<div class="rule-card">';
        html += '<div style="margin-bottom:8px;"><span class="rule-badge">'+rule.combo+'</span><strong>→ Đọc "'+rule.sound+'"</strong></div>';
        html += '<p style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;">'+rule.desc+'</p>';
        html += '<div style="display:flex;flex-wrap:wrap;gap:4px;">';
        for (var e = 0; e < rule.examples.length; e++) {
          html += '<span class="rule-example" onclick="TTS.speak(\''+rule.examples[e]+'\',0.8)"><i class="fa-solid fa-volume-up" style="font-size:9px;"></i> '+rule.examples[e]+'</span>';
        }
        html += '</div></div>';
      }
    }

    document.getElementById('app-content').innerHTML = html;
  }

  window.switchAlphaTab = function(tab) { currentTab = tab; render(); };
  </script>
</body>
</html>
