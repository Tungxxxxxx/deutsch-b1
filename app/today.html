<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Học hôm nay - Deutsch B1</title>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#1a73e8">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div id="navbar"></div>
  <div class="container" id="app-content">
    <div class="loading"><div class="spinner"></div> Đang tải...</div>
  </div>
  <div class="toast" id="toast"></div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/progress.js"></script>
  <script src="../js/tts.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/data/daily-plans.js"></script>
  <script>
  function pageInit() {
    var data = Progress.get();
    var state = {
      currentDay: data.progress.currentDay || 1,
      completedSteps: data.daily.completedSteps || {},
      streak: data.progress.streak || 0,
      totalMinutes: data.progress.totalMinutes || 0,
      daysCompleted: data.daily.daysCompleted || []
    };

    function render() {
      var plan = DAILY_PLANS.find(function(p){ return p.day === state.currentDay; });
      if (!plan) return;

      var html = '';
      // Day selector
      html += '<div style="display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;">';
      for (var i = 0; i < DAILY_PLANS.length; i++) {
        var p = DAILY_PLANS[i];
        var isDone = state.daysCompleted.indexOf(p.day) >= 0;
        var isActive = p.day === state.currentDay;
        var cls = isActive ? 'btn-primary' : (isDone ? 'btn-success' : 'btn-outline');
        html += '<button class="btn btn-sm ' + cls + '" onclick="selectDay(' + p.day + ')">Ngày ' + p.day + (isDone ? ' ✓' : '') + '</button>';
      }
      html += '</div>';

      // Header
      html += '<div style="background:linear-gradient(135deg,#1a73e8,#4fc3f7);border-radius:var(--radius-xl);padding:28px;color:white;margin-bottom:24px;">';
      html += '<h1 style="font-size:22px;margin-bottom:4px;">' + plan.title + '</h1>';
      html += '<p style="opacity:0.9;font-size:14px;">' + plan.subtitle + '</p>';
      html += '<div style="margin-top:14px;display:flex;gap:16px;font-size:13px;opacity:0.85;flex-wrap:wrap;">';
      html += '<span><i class="fa-solid fa-clock"></i> ' + plan.totalTime + '</span>';
      html += '<span><i class="fa-solid fa-book"></i> ' + plan.newWords + '</span>';
      html += '<span><i class="fa-solid fa-fire"></i> Streak: ' + state.streak + '</span>';
      html += '</div></div>';

      // Steps
      var completedCount = 0;
      var firstIncomplete = -1;
      for (var j = 0; j < plan.steps.length; j++) {
        var step = plan.steps[j];
        var isDone2 = state.completedSteps[step.id] === true;
        if (isDone2) completedCount++;
        else if (firstIncomplete === -1) firstIncomplete = j;
        var isAct = (!isDone2 && j === firstIncomplete);
        var cardBg = isDone2 ? 'var(--success-light)' : (isAct ? 'white' : 'white');
        var cardBorder = isDone2 ? 'var(--success)' : (isAct ? 'var(--primary)' : 'var(--border-light)');
        var iconMap = {vocab:'fa-book',grammar:'fa-spell-check',listen:'fa-headphones',read:'fa-book-open',quiz:'fa-dumbbell',review:'fa-rotate',video:'fa-video',lesson:'fa-graduation-cap',immersion:'fa-music'};
        var icon = iconMap[step.type] || 'fa-circle';

        html += '<div class="card" style="border:2px solid ' + cardBorder + ';background:' + cardBg + ';' + (isDone2 ? '' : (isAct ? 'box-shadow:var(--shadow-md);' : 'opacity:0.7;')) + '">';
        html += '<div style="display:flex;align-items:center;gap:12px;">';
        html += '<div style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;background:' + (isDone2 ? 'var(--success)' : (isAct ? 'var(--primary)' : 'var(--border-light)')) + ';color:' + (isDone2 || isAct ? 'white' : 'var(--text-muted)') + ';">' + (isDone2 ? '<i class="fa-solid fa-check"></i>' : (j+1)) + '</div>';
        html += '<div style="flex:1;"><div style="font-weight:600;font-size:14px;"><i class="fa-solid ' + icon + '"></i> ' + step.title + '</div>';
        html += '<div style="font-size:12px;color:var(--text-secondary);margin-top:2px;">' + step.desc + '</div>';
        html += '<div style="font-size:11px;color:var(--text-muted);margin-top:4px;"><i class="fa-regular fa-clock"></i> ' + step.time + '</div>';
        html += '</div></div>';

        html += '<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border-light);">';
        if (isDone2) {
          html += '<span style="color:var(--success);font-size:13px;font-weight:500;"><i class="fa-solid fa-check-circle"></i> Hoàn thành!</span>';
          html += ' <button class="btn btn-outline btn-sm" onclick="undoStep(\'' + step.id + '\')">Làm lại</button>';
        } else {
          if (step.link) html += '<a href="' + step.link + '" class="btn btn-outline btn-sm"><i class="fa-solid fa-arrow-right"></i> Mở bài</a> ';
          html += '<button class="btn btn-success btn-sm" onclick="completeStep(\'' + step.id + '\',' + parseInt(step.time) + ')"><i class="fa-solid fa-check"></i> Hoàn thành</button>';
        }
        html += '</div></div>';
      }

      // Progress bar
      var pct = plan.steps.length > 0 ? Math.round((completedCount / plan.steps.length) * 100) : 0;
      html += '<div class="card" style="margin-top:20px;"><div style="font-size:14px;font-weight:600;margin-bottom:10px;">Tiến độ hôm nay</div>';
      html += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%;"></div></div>';
      html += '<div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--text-muted);">';
      html += '<span>' + completedCount + '/' + plan.steps.length + ' bước</span>';
      html += '<span>' + state.totalMinutes + ' phút đã học</span></div></div>';

      document.getElementById('app-content').innerHTML = html;
    }

    window.selectDay = function(d) {
      state.currentDay = d;
      Progress.setCurrentDay(d);
      render();
    };

    window.completeStep = function(stepId, minutes) {
      state.completedSteps[stepId] = true;
      state.totalMinutes += (minutes || 0);
      Progress.completeStep(stepId, minutes);

      var plan = DAILY_PLANS.find(function(p){ return p.day === state.currentDay; });
      var allDone = plan.steps.every(function(s){ return state.completedSteps[s.id] === true; });
      if (allDone && state.daysCompleted.indexOf(state.currentDay) === -1) {
        state.daysCompleted.push(state.currentDay);
        Progress.completeDay(state.currentDay);
        state.streak = Progress.get().progress.streak;
        App.showToast('🎉 Ngày ' + state.currentDay + ' hoàn thành! Streak: ' + state.streak);
      } else {
        App.showToast('✅ Bước hoàn thành!');
      }
      render();
    };

    window.undoStep = function(stepId) {
      delete state.completedSteps[stepId];
      Progress.uncompleteStep(stepId);
      render();
    };

    render();
  }
  </script>
</body>
</html>
