<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ngữ pháp - Deutsch B1</title>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#1a73e8">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .grammar-table { width:100%;border-collapse:collapse;margin:12px 0;font-size:13px; }
    .grammar-table th { background:var(--primary-light);color:var(--primary-dark);padding:8px 12px;text-align:left;font-weight:600;border:1px solid var(--border-light); }
    .grammar-table td { padding:8px 12px;border:1px solid var(--border-light); }
    .grammar-table tr:nth-child(even) td { background:var(--bg); }
    .rule-box { background:var(--success-light);border:1px solid rgba(52,168,83,0.2);border-radius:var(--radius-md);padding:14px 18px;margin:14px 0;font-size:13px; }
    .example-box { background:var(--bg);border-left:4px solid var(--primary);padding:12px 16px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin:10px 0; }
    .exercise-item { margin-bottom:10px;padding:10px 14px;background:var(--bg);border-radius:var(--radius-sm);display:flex;align-items:center;gap:10px;font-size:14px; }
    .exercise-item input { border:none;border-bottom:2px solid var(--border);background:transparent;padding:4px 8px;font-size:14px;width:90px;font-family:var(--font); }
    .exercise-item input:focus { outline:none;border-color:var(--primary); }
    .exercise-item input.correct { border-color:var(--success);background:var(--success-light); }
    .exercise-item input.wrong { border-color:var(--error);background:var(--error-light); }
    .q-num { width:22px;height:22px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0; }
  </style>
</head>
<body>
  <div id="navbar"></div>
  <div class="container" id="app-content">
    <div class="loading"><div class="spinner"></div> Đang tải...</div>
  </div>
  <div class="toast" id="toast"></div>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/progress.js"></script>
  <script src="../js/tts.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/data/grammar.js"></script>
  <script>
  var currentLesson = 0;
  function pageInit() { render(); }

  function render() {
    var lesson = GRAMMAR_DATA[currentLesson];
    var html = '';
    // Tabs
    html += '<div style="display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;">';
    for (var i = 0; i < GRAMMAR_DATA.length; i++) {
      var cls = i === currentLesson ? 'btn-primary' : 'btn-outline';
      html += '<button class="btn btn-sm ' + cls + '" onclick="switchLesson(' + i + ')">' + GRAMMAR_DATA[i].title.split('(')[0].trim().substring(0, 20) + '</button>';
    }
    html += '</div>';

    html += '<div class="card"><h2 style="font-size:20px;font-weight:700;margin-bottom:4px;">' + lesson.title + '</h2>';
    html += '<p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;">' + lesson.subtitle + '</p>';

    // Table
    html += '<div style="overflow-x:auto;"><table class="grammar-table"><tr>';
    for (var h = 0; h < lesson.table.headers.length; h++) html += '<th>' + lesson.table.headers[h] + '</th>';
    html += '</tr>';
    for (var r = 0; r < lesson.table.rows.length; r++) {
      html += '<tr>';
      for (var c = 0; c < lesson.table.rows[r].length; c++) html += '<td>' + lesson.table.rows[r][c] + '</td>';
      html += '</tr>';
    }
    html += '</table></div>';

    // Rule
    html += '<div class="rule-box"><strong style="color:var(--success);">💡 Quy tắc:</strong> ' + lesson.rule + '</div>';

    // Examples
    for (var e = 0; e < lesson.examples.length; e++) {
      var ex = lesson.examples[e];
      html += '<div class="example-box"><div style="font-weight:600;font-size:14px;">' + ex.de;
      html += ' <button style="background:none;border:none;color:var(--primary);cursor:pointer;" onclick="TTS.speak(\'' + ex.de.replace(/'/g, "\\'") + '\')"><i class="fa-solid fa-volume-high"></i></button>';
      html += '</div><div style="font-size:12px;color:var(--text-secondary);font-style:italic;">' + ex.vi + '</div></div>';
    }

    // Exercises
    html += '<div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border-light);">';
    html += '<h3 style="font-size:15px;font-weight:600;margin-bottom:14px;"><i class="fa-solid fa-pen"></i> Bài tập</h3>';
    for (var q = 0; q < lesson.exercises.length; q++) {
      var ex2 = lesson.exercises[q];
      html += '<div class="exercise-item"><span class="q-num">' + (q+1) + '</span> ';
      var parts = ex2.prompt.split('___');
      html += parts[0] + '<input type="text" data-answer="' + ex2.answer + '" size="8">' + (parts[1] || '');
      html += '</div>';
    }
    html += '<button class="btn btn-primary" style="margin-top:12px;" onclick="checkGrammar()"><i class="fa-solid fa-check"></i> Kiểm tra</button>';
    html += '<div id="grammar-result" style="margin-top:10px;"></div>';
    html += '</div></div>';

    document.getElementById('app-content').innerHTML = html;
  }

  window.switchLesson = function(idx) { currentLesson = idx; render(); };

  window.checkGrammar = function() {
    var inputs = document.querySelectorAll('.exercise-item input[data-answer]');
    var correct = 0;
    inputs.forEach(function(input) {
      var ans = input.dataset.answer.toLowerCase().trim();
      var user = input.value.toLowerCase().trim();
      if (user === ans) { input.classList.remove('wrong'); input.classList.add('correct'); correct++; }
      else { input.classList.remove('correct'); input.classList.add('wrong'); input.title = 'Đáp án: ' + input.dataset.answer; }
    });
    var total = inputs.length;
    var pct = Math.round((correct / total) * 100);
    var el = document.getElementById('grammar-result');
    el.innerHTML = (correct === total ? '🎉 ' : '') + correct + '/' + total + ' đúng (' + pct + '%)';
    el.style.cssText = 'padding:10px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;background:' + (correct === total ? 'var(--success-light);color:var(--success)' : 'var(--warning-light);color:#e37400') + ';';
    Progress.completeGrammar(GRAMMAR_DATA[currentLesson].id, correct, total);
  };
  </script>
</body>
</html>
